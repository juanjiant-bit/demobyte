name: Build Pico UF2

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install basic tools only
        run: |
          sudo apt update
          sudo apt install -y cmake git python3

      - name: Install ARM toolchain (fast)
        uses: carlosperate/arm-none-eabi-gcc-action@v1

      - name: Clone pico-sdk
        run: |
          git clone https://github.com/raspberrypi/pico-sdk.git --depth=1
          cd pico-sdk
          git submodule update --init

      - name: Set SDK path
        run: echo "PICO_SDK_PATH=$GITHUB_WORKSPACE/pico-sdk" >> $GITHUB_ENV

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. -DPICO_BOARD=pico -DBYT3_MINIMAL_HW=ON

      - name: Build minimal only
        run: |
          cd build
          make bytebeat_machine_minimal -j4

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: uf2
          path: |
            build/*.uf2
            build/**/*.uf2
