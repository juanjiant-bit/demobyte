name: Build UF2

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt update
          sudo apt install -y \
            cmake \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            build-essential \
            python3 \
            git

      - name: Clone pico-sdk
        run: |
          git clone https://github.com/raspberrypi/pico-sdk.git /home/runner/pico-sdk
          cd /home/runner/pico-sdk
          git submodule update --init

      - name: Export PICO_SDK_PATH
        run: |
          echo "PICO_SDK_PATH=/home/runner/pico-sdk" >> $GITHUB_ENV

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. -DPICO_BOARD=pico

      - name: Build
        run: |
          cd build
          make -j4 pcm5102_probe_min

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: pcm5102-probe-min-uf2
          path: |
            build/pcm5102_probe_min.uf2
            build/pcm5102_probe_min.elf
            build/pcm5102_probe_min.bin
