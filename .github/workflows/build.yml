name: Build Dem0!Byt3 V16

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Cache apt packages
        uses: actions/cache@v3
        with:
          path: /var/cache/apt
          key: apt-${{ runner.os }}-cmake-gcc-arm
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib python3 git
      - name: Cache pico-sdk
        uses: actions/cache@v3
        with:
          path: ~/pico-sdk
          key: pico-sdk-1.5.1
      - name: Clone pico-sdk
        run: |
          if [ ! -d ~/pico-sdk ]; then
            git clone --depth 1 --branch 1.5.1 https://github.com/raspberrypi/pico-sdk.git ~/pico-sdk
            cd ~/pico-sdk && git submodule update --init
          fi
      - name: Build
        run: |
          export PICO_SDK_PATH=~/pico-sdk
          mkdir build && cd build
          cmake .. -DPICO_BOARD=pico
          make dem0byt3_v16 -j4
      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: Dem0Byt3_V16
          path: build/*.uf2
