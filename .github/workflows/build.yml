name: Build UF2

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            build-essential \
            python3

      - name: Clone Pico SDK
        run: |
          git clone --depth=1 https://github.com/raspberrypi/pico-sdk.git "$HOME/pico-sdk"
          cd "$HOME/pico-sdk"
          git submodule update --init

      - name: Find project directory
        id: findproj
        shell: bash
        run: |
          PROJECT_DIR=$(find . -name CMakeLists.txt \
            -not -path "./.github/*" \
            -not -path "./build/*" \
            | head -n 1 | xargs dirname)

          if [ -z "$PROJECT_DIR" ]; then
            echo "No se encontró ningún CMakeLists.txt en el repo"
            exit 1
          fi

          echo "Proyecto encontrado en: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Configure
        run: |
          cmake -S "${{ steps.findproj.outputs.project_dir }}" \
                -B "${{ steps.findproj.outputs.project_dir }}/build" \
                -G Ninja \
                -DPICO_SDK_PATH="$HOME/pico-sdk" \
                -DPICO_BOARD=pico

      - name: Build
        run: |
          cmake --build "${{ steps.findproj.outputs.project_dir }}/build" --config Release -j 2

      - name: Show build outputs
        run: |
          find "${{ steps.findproj.outputs.project_dir }}/build" -maxdepth 2 -type f | sort

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: byt3_validate_dac_sweep_build
          path: |
            ${{ steps.findproj.outputs.project_dir }}/build/*.uf2
            ${{ steps.findproj.outputs.project_dir }}/build/*.bin
            ${{ steps.findproj.outputs.project_dir }}/build/*.hex
            ${{ steps.findproj.outputs.project_dir }}/build/*.elf
